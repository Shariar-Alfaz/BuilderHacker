name: Publish Docs

on:
  push:
    branches:
      - production # production branch

permissions:
  actions: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install docfx
        run: |
          dotnet tool install -g docfx || dotnet tool update -g docfx
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Build docs with DocFX
        run: |
          # run docfx in repository root (assumes docfx.json is at the repo root)
          docfx docfx.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
