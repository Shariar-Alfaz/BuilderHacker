name: Publish Docs

on:
  push:
    branches:
      - production

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # REQUIRED for SourceLink + doc source navigation

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      # 🔥 FIX 1: ensure stable tool install
      - name: Install DocFX
        run: |
          dotnet tool install -g docfx || dotnet tool update -g docfx
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      # 🔥 FIX 2: ensure clean state (more aggressive cleanup)
      - name: Clean workspace
        run: |
          rm -rf _site
          rm -rf obj
          rm -rf bin
          rm -rf api

      # 🔥 FIX 3: validate docfx file exists (prevents silent failures)
      - name: Validate DocFX config
        run: |
          if [ ! -f "docfx.json" ]; then
            echo "docfx.json not found in repo root!"
            exit 1
          fi

      # 🔥 FIX 4: build docs with explicit verbosity (debug CI issues faster)
      - name: Build Docs
        run: docfx docfx.json --logLevel Info

      # 🔥 FIX 5: ensure output exists
      - name: Validate output
        run: |
          if [ ! -d "_site" ]; then
            echo "❌ DocFX output _site folder not found!"
            exit 1
          fi

      # 🔥 FIX 6: prevent accidental empty deployment
      - name: List output
        run: ls -R _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4