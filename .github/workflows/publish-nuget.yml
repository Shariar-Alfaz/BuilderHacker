name: Publish NuGet Packages

on:
  push:
    branches:
      - production

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # REQUIRED for SourceLink

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            6.0.x

      - name: Restore
        run: dotnet restore Src/BuilderHacker/BuilderHacker.slnx

      # 🔥 IMPORTANT FIX: force deterministic + SourceLink consistency at build time
      - name: Build (Release)
        run: |
          dotnet build Src/BuilderHacker/BuilderHacker.slnx -c Release \
            /p:ContinuousIntegrationBuild=true \
            /p:Deterministic=true \
            /p:PublishRepositoryUrl=true \
            /p:EmbedUntrackedSources=false \
            --no-restore

      - name: Test
        run: dotnet test Src/BuilderHacker/BuilderHacker.Tests/BuilderHacker.Tests.csproj -c Release --no-build

      # Clean pack ensures correct PDB + symbol generation
      - name: Clean
        run: dotnet clean Src/BuilderHacker/BuilderHacker.slnx -c Release

      - name: Pack
        run: |
          dotnet pack Src/BuilderHacker/BuilderHacker.Abstraction/BuilderHacker.Abstraction.csproj -c Release -o ./artifacts
          dotnet pack Src/BuilderHacker/BuilderHacker.Core/BuilderHacker.Core.csproj -c Release -o ./artifacts
          dotnet pack Src/BuilderHacker/BuilderHacker.Generator/BuilderHacker.Generator.csproj -c Release -o ./artifacts

      # Push main packages
      - name: Push NuGet packages
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --skip-duplicate

      # Push symbols separately (safe + deterministic)
      - name: Push Symbols (.snupkg)
        run: |
          dotnet nuget push "./artifacts/*.snupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --skip-duplicate