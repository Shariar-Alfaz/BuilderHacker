name: Publish NuGet Packages

on:
  push:
    branches:
      - production

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SourceLink needs full history to track commit hashes

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            6.0.x

      - name: Restore
        run: dotnet restore Src/BuilderHacker/BuilderHacker.slnx

      - name: Build
        run: dotnet build Src/BuilderHacker/BuilderHacker.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Src/BuilderHacker/BuilderHacker.Tests/BuilderHacker.Tests.csproj -c Release --no-build

      - name: Pack
        run: |
          dotnet pack Src/BuilderHacker/BuilderHacker.Abstraction/BuilderHacker.Abstraction.csproj -c Release --no-build -o ./artifacts /p:EmbedUntrackedSources=true
          dotnet pack Src/BuilderHacker/BuilderHacker.Core/BuilderHacker.Core.csproj -c Release --no-build -o ./artifacts /p:EmbedUntrackedSources=true
          dotnet pack Src/BuilderHacker/BuilderHacker.Generator/BuilderHacker.Generator.csproj -c Release --no-build -o ./artifacts /p:EmbedUntrackedSources=true

      - name: Push to NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --skip-duplicate